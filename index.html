<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>대화 내용 백업기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #eeeeee;
    --surface: #f7f8fa;
    --chat-bg: #f7f7f7;
    --bubble-left: #ffffff;
    --bubble-right: #dff3fb;
    --text: #2f3437;
    --subtext: #737b80;
    --name: #40474c;
    --chat-name: #40474c;
    --input-bg: #ffffff;
    --input-text: #2f3437;
    --btn-bg: #96bae8;
    --btn-hover: #82a9dc;
    --accent-soft: #e6f6fd;
    --shadow: rgba(30, 36, 40, 0.08);
    --border: #d7dde1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 18px;
    color: var(--text);
  }

  .app-shell {
    width: min(1186px, 100%);
    min-height: calc(100vh - 36px);
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 750px) 420px;
    gap: 16px;
  }

  .chat-pane {
    border: 1px solid var(--border);
    background: #ffffff;
    box-shadow: 0 8px 28px var(--shadow);
  }

  .chat-pane {
    min-width: 0;
    border-radius: 10px;
    padding: 16px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 12px;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 32px;
  }

  h1 {
    font-size: 13px;
    font-weight: 700;
    color: var(--name);
    letter-spacing: 0.08em;
    opacity: 0.7;
    text-transform: uppercase;
  }

  .chat-caption {
    display: none;
    color: var(--subtext);
    font-size: 13px;
    white-space: nowrap;
  }
  .chat-bg-controls {
    order: 2;
    margin-left: auto;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    color: var(--subtext);
    font-size: 11px;
    white-space: nowrap;
  }
  .chat-bg-label,
  .chat-name-label,
  .transparent-toggle {
    min-width: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--subtext);
  }
  .transparent-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .transparent-toggle input {
    width: auto;
    min-height: auto;
  }
  #chat-bg-color {
    width: 30px;
    height: 28px;
  }
  #chat-name-color {
    width: 30px;
    height: 28px;
  }
  .chat-reset-btn {
    min-height: 28px;
    padding: 3px 8px;
    border-radius: 7px;
  }

  /* ── 채팅 뷰어 ── */
  #chat-view {
    width: 100%;
    background: var(--chat-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    padding: 18px 14px;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  #chat-view::-webkit-scrollbar { width: 4px; }
  #chat-view::-webkit-scrollbar-thumb { background: #bcc7ce; border-radius: 2px; }

  /* ── 메시지 행 ── */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }
  .msg-row.right { justify-content: flex-end; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar,
  .avatar-frame {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
    background: #b0c4de;
    overflow: hidden;
    position: relative;
  }
  .avatar-frame.shape-square {
    border-radius: 8px;
  }
  .char-avatar.shape-square {
    border-radius: 6px;
  }

  .avatar-img {
    width: 70.71%;
    height: 70.71%;
    margin: 14.645%;
    object-fit: contain;
    display: block;
    transform-origin: center;
  }
  .shape-square > .avatar-img {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: calc(100% - 120px); /* 아바타 44px + gap 8px + 여유 */
  }
  .msg-row.right .msg-body { align-items: flex-end; }
  .msg-row.right .msg-actions { flex-direction: row-reverse; }

  .msg-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--chat-name);
    padding: 0 4px;
  }

  .bubble {
    background: var(--bubble-left);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 4px 14px 14px 14px;
    font-size: 13px;
    line-height: 1.6;
    box-shadow: 0 2px 6px var(--shadow);
    word-break: break-word;
    white-space: pre-wrap;
    text-align: justify;
  }
  .msg-row.right .bubble {
    background: var(--bubble-right);
    border-radius: 14px 4px 14px 14px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--subtext);
    font-size: 11px;
    letter-spacing: 0.06em;
    margin: 2px 0;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ccd5da;
  }

  /* ── 컨트롤 패널 ── */
  #control-panel {
    min-width: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: calc(100vh - 36px);
    max-height: calc(100vh - 36px);
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #control-panel::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }
  #control-panel > .sidebar-section:last-of-type {
    margin-top: auto;
  }

  .sidebar-section {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #ffffff;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-title {
    font-size: 13px;
    color: #4b565d;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 14px;
    border-radius: 999px;
    background: var(--btn-bg);
    flex: 0 0 auto;
  }

  /* 행 레이아웃: 모바일에서 세로 스택 */
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* 레이블 */
  label {
    font-size: 11px;
    font-weight: 700;
    color: var(--subtext);
    white-space: nowrap;
    min-width: 42px;
  }

  input[type=text], input[type=file], textarea, select {
    flex: 1;
    min-width: 0;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--input-text);
    border-radius: 8px;
    padding: 6px 9px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    min-height: 34px;
  }
  input::placeholder,
  textarea::placeholder {
    font-size: 11px;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    border-color: var(--btn-bg);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea {
    resize: vertical;
    min-height: 72px;
  }
  select option { background: #ffffff; }

  input[type=file] {
    color: var(--subtext);
    cursor: pointer;
  }
  input[type=file]::file-selector-button {
    height: 24px;
    margin-right: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #eef1f3;
    color: #3d454a;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }

  .profile-tools {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 98px;
    gap: 6px;
    width: 100%;
  }
  .profile-editor {
    display: grid;
    grid-template-columns: 74px minmax(0, 1fr);
    gap: 12px;
    align-items: start;
  }
  .profile-preview-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .profile-preview-title { display: none; }
  .profile-field-title {
    min-width: 0;
    color: var(--subtext);
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
  }
  .profile-field-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .profile-field {
    display: grid;
    gap: 6px;
  }
  #profile-preview {
    width: 68px;
    height: 68px;
    background: #b4c9e2;
    box-shadow: 0 4px 12px rgba(60, 72, 84, 0.14);
  }
  .profile-shape-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    width: 68px;
  }
  .profile-shape-toggle button {
    min-height: 24px;
    padding: 3px 0;
    font-size: 11px;
    border: 1px solid var(--border);
    background: #eef1f3;
    color: #3d454a;
  }
  .profile-shape-toggle button.active {
    border-color: transparent;
    background: var(--btn-bg);
    color: #20313a;
  }

  button {
    background: var(--btn-bg);
    color: #20313a;
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    touch-action: manipulation; /* 모바일 탭 딜레이 제거 */
    min-height: 32px;
  }
  button:hover { background: var(--btn-hover); }
  button:active { transform: scale(0.97); }
  button.danger { background: #d6dadd; color: #6b2b2b; }
  button.danger:hover { background: #cbd1d5; }
  button.full { width: 100%; }

  .divider { display: none; }

  /* 컬러 피커 */
  input[type=color] {
    width: 34px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #ffffff;
    padding: 2px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .color-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
    background: transparent;
    border: 0;
    padding: 0;
  }
  .color-label {
    font-size: 11px;
    color: var(--subtext);
    font-weight: 700;
    white-space: nowrap;
  }

  /* 하단 버튼 행: 모바일에서 세로 */
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row button { flex: 1; }

  .storage-tools {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    width: 100%;
  }
  .slot-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .slot-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 6px;
    background: #f5f7f8;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 8px;
    color: var(--text);
    font-size: 12px;
  }
  .slot-title {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .slot-meta {
    color: var(--subtext);
    font-size: 11px;
    margin-top: 2px;
  }
  .slot-empty {
    color: var(--subtext);
    font-size: 12px;
    line-height: 1.5;
  }
  button.ghost {
    background: #eef1f3;
    color: #3d454a;
  }
  button.ghost:hover { background: #e2e7ea; }

  /* ── 캐릭터 목록 ── */
  #char-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  #char-list:empty {
    display: none;
  }
  .char-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #f5f7f8;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 12px;
    color: var(--text);
  }
  .char-tag.editing {
    border-color: var(--btn-bg);
    background: var(--accent-soft);
  }
  .char-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    box-shadow: none;
    background: #4a6080;
  }

  .crop-modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(8, 12, 20, 0.72);
  }
  .crop-modal.open { display: flex; }
  .crop-panel {
    width: min(100%, 360px);
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 16px 44px rgba(0,0,0,0.35);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .crop-title {
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
  }
  .crop-stage {
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f5f6;
    border: 1px solid var(--border);
    border-radius: 8px;
    touch-action: none;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .crop-image-ghost {
    position: absolute;
    width: 152.73px;
    height: 152.73px;
    object-fit: contain;
    opacity: 0.5;
    pointer-events: none;
    transform-origin: center;
    z-index: 0;
  }
  .crop-image-ghost.shape-square {
    width: 216px;
    height: 216px;
  }
  .crop-viewport {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.82);
    overflow: hidden;
    background: rgba(214,221,226,0.45);
    box-shadow: 0 0 0 999px rgba(243,245,246,0.55);
    cursor: grab;
    position: relative;
    z-index: 1;
  }
  .crop-viewport.shape-square {
    border-radius: 8px;
  }
  .crop-viewport:active { cursor: grabbing; }
  .crop-actions {
    display: flex;
    gap: 8px;
  }
  .crop-actions button { flex: 1; }
  .char-tag .color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .char-tag .del {
    cursor: pointer;
    color: #c0392b;
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    padding-left: 2px;
  }
  .char-tag button {
    min-height: 24px;
    padding: 2px 7px;
    border-radius: 6px;
    font-size: 11px;
  }
  .recrop-profile-btn {
    width: 100%;
    min-height: 28px;
    padding: 3px 6px;
  }

  /* ── 말풍선 액션 버튼 ── */
  .msg-row { position: relative; }
  .msg-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 0;
  }
  .msg-row:hover .msg-actions { opacity: 1; }
  .msg-row.editing .msg-actions {
    display: none;
  }
  .msg-actions button {
    background: rgba(255,255,255,0.92);
    color: #566169;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    line-height: 1.4;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .msg-actions button:hover { background: var(--accent-soft); color: #20313a; }
  .msg-actions button.del-btn { color: #9a4545; }
  .msg-actions button.del-btn:hover { background: #f0dddd; color: #7b2f2f; }

  /* 수정 모드 텍스트에어리어 */
  .bubble-edit {
    max-width: 100%;
    min-height: 60px;
    background: #ffffff;
    border: 1px solid var(--btn-bg);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
  }
  .edit-save-btn {
    background: var(--btn-bg) !important;
    color: #fff !important;
    border-color: transparent !important;
    margin-top: 4px;
  }

  /* 날짜 구분선 액션 */
  .date-divider { position: relative; }
  .date-del {
    cursor: pointer;
    color: #9a4545;
    font-size: 13px;
    font-weight: 700;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .date-divider:hover .date-del { opacity: 1; }

  /* ── HTML 출력 ── */
  #output-section {
    width: 100%;
    max-width: none;
    margin-top: 10px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  #output-section textarea {
    width: 100%;
    min-height: 140px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text);
    background: #ffffff;
    border-color: var(--border);
  }
  .hint {
    font-size: 11px;
    color: var(--subtext);
    text-align: center;
    line-height: 1.6;
  }

  @media (max-width: 900px) {
    body { padding: 10px; }

    .app-shell {
      min-height: auto;
      grid-template-columns: 1fr;
    }

    .chat-pane {
      min-height: 460px;
    }

    #control-panel {
      height: auto;
      max-height: none;
    }
  }

  /* ── 모바일 전용 조정 ── */
  @media (max-width: 520px) {
    body { padding: 8px; }

    .app-shell {
      gap: 10px;
    }

    .chat-pane,
    #control-panel {
      border-radius: 8px;
    }

    .chat-pane {
      padding: 10px;
      min-height: 420px;
    }

    .chat-header {
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
    }

    .chat-caption {
      white-space: normal;
    }

    #chat-view {
      padding: 12px 10px;
      gap: 30px;
    }

    .avatar,
    .avatar-frame { width: 38px; height: 38px; }
    .msg-body { max-width: calc(100% - 110px); }
    .bubble { font-size: 13px; padding: 7px 11px; }

    #control-panel { padding: 0; gap: 10px; }

    .sidebar-section {
      padding: 10px;
    }

    /* 모바일에서 레이블을 위에 */
    .row {
      flex-direction: column;
      align-items: stretch;
    }
    /* 버튼은 가로로 유지 */
    .row.inline {
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
    }

    label { min-width: unset; }

    .color-group { flex-wrap: nowrap; }

    .storage-tools,
    .slot-item,
    .profile-editor,
    .profile-tools {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="app-shell">
  <main class="chat-pane">
    <div class="chat-header">
      <div class="chat-bg-controls" aria-label="대화 내용 배경 색상">
        <label class="chat-bg-label" for="chat-bg-color">배경</label>
        <input type="color" id="chat-bg-color" value="#f7f7f7" onchange="setChatBackgroundColor(this.value)">
        <label class="chat-name-label" for="chat-name-color">이름</label>
        <input type="color" id="chat-name-color" value="#40474c" onchange="setChatNameColor(this.value)">
        <button type="button" class="ghost chat-reset-btn" onclick="resetChatBackground()">배경 초기화</button>
        <label class="transparent-toggle"><input type="checkbox" id="chat-bg-transparent" onchange="setChatBackgroundTransparent(this.checked)"> 투명</label>
      </div>
      <h1>💬 대화 내용 백업기</h1>
      <span class="chat-caption">대화 내용</span>
    </div>

    <div id="chat-view"></div>

    <div id="output-section">
      <textarea id="html-output" readonly></textarea>
      <div class="hint">위 코드를 복사 → HTML 편집기에 붙여넣기 하세요.</div>

<script>
let characters = {};
let messages = [];
let msgIdSeq = 0;
let layoutMode = 'paired';
let conversationSlots = [];
let pendingProfile = null;
let selectedProfileShape = 'circle';
let editingCharacterName = null;
let chatBackground = { color: '#f7f7f7', transparent: false };
let chatNameColor = '#40474c';
let cropState = null;
let cropDrag = null;
let cropGesture = null;
const cropPointers = new Map();
const imageCache = {};
const CROP_CONTENT_SIZE = 216;
const EXPORT_IMAGE_MAX_SIZE = 128;
const EXPORT_WEBP_QUALITY = 0.6;

const STORAGE_KEYS = {
  characters: 'chatBackup.characters.v2',
  draft: 'chatBackup.draft.v2',
  layout: 'chatBackup.layout.v1',
  chatBg: 'chatBackup.chatBg.v1',
  nameColor: 'chatBackup.nameColor.v1',
  slots: 'chatBackup.slots.v1'
};
const IMAGE_DB_NAME = 'chatBackup.images.v1';
const IMAGE_STORE_NAME = 'images';

function readJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function writeJson(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    alert('로컬 저장 공간이 부족합니다. 기존에 저장된 큰 프로필 이미지나 저장 슬롯을 삭제해 주세요.');
    return false;
  }
}

function isDataImage(src) {
  return typeof src === 'string' && src.startsWith('data:image/');
}

function isIndexedImage(src) {
  return typeof src === 'string' && src.startsWith('idb:');
}

function openImageDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IMAGE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(IMAGE_STORE_NAME, { keyPath: 'id' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveImageBlobRef(dataUrl) {
  if (!isDataImage(dataUrl)) return dataUrl;
  const id = 'profile-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  imageCache[id] = dataUrl;
  const db = await openImageDb();
  await new Promise((resolve, reject) => {
    const tx = db.transaction(IMAGE_STORE_NAME, 'readwrite');
    tx.objectStore(IMAGE_STORE_NAME).put({ id, dataUrl });
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
  db.close();
  return 'idb:' + id;
}

async function resolveImageSrc(src) {
  if (!isIndexedImage(src)) return src || '';
  const id = src.slice(4);
  if (imageCache[id]) return imageCache[id];
  const db = await openImageDb();
  const item = await new Promise((resolve, reject) => {
    const tx = db.transaction(IMAGE_STORE_NAME, 'readonly');
    const req = tx.objectStore(IMAGE_STORE_NAME).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  db.close();
  imageCache[id] = item && item.dataUrl ? item.dataUrl : '';
  return imageCache[id];
}

function setImageElementSource(img, src, frame) {
  resolveImageSrc(src).then(resolved => {
    if (!resolved) return;
    img.src = resolved;
  }).catch(() => {
    if (frame) frame.style.background = '#6a8aaa';
  });
}

async function persistProfileImage(profile) {
  if (!profile || !isDataImage(profile.src)) return profile;
  return { ...profile, src: await saveImageBlobRef(profile.src) };
}

async function migrateProfileImagesToIndexedDb() {
  let changed = false;
  const migrateCharacterMap = async map => {
    for (const character of Object.values(map || {})) {
      if (!character) continue;
      const profile = getProfile(character);
      if (isDataImage(profile.src)) {
        const storedProfile = await persistProfileImage(profile);
        character.profile = storedProfile;
        character.url = storedProfile.src;
        changed = true;
      }
    }
  };
  await migrateCharacterMap(characters);
  for (const slot of conversationSlots) {
    await migrateCharacterMap(slot.characters);
  }
  return changed;
}

function saveCharacters() {
  return writeJson(STORAGE_KEYS.characters, characters);
}

function saveDraft() {
  writeJson(STORAGE_KEYS.draft, { messages, msgIdSeq });
}

function saveLayout() {
  try { localStorage.setItem(STORAGE_KEYS.layout, layoutMode); } catch (e) {}
}

function getChatBackgroundCss() {
  return chatBackground.transparent ? 'transparent' : (chatBackground.color || '#f7f7f7');
}

function getChatPreviewBackgroundCss() {
  return chatBackground.color || '#f7f7f7';
}

function saveChatBackground() {
  writeJson(STORAGE_KEYS.chatBg, chatBackground);
}

function saveChatNameColor() {
  try { localStorage.setItem(STORAGE_KEYS.nameColor, chatNameColor); } catch (e) {}
}

function applyChatBackground() {
  const chatView = document.getElementById('chat-view');
  const colorInput = document.getElementById('chat-bg-color');
  const transparentInput = document.getElementById('chat-bg-transparent');
  if (chatView) chatView.style.background = getChatPreviewBackgroundCss();
  if (colorInput) {
    colorInput.value = chatBackground.color || '#f7f7f7';
    colorInput.disabled = !!chatBackground.transparent;
  }
  if (transparentInput) transparentInput.checked = !!chatBackground.transparent;
}

function applyChatNameColor() {
  const input = document.getElementById('chat-name-color');
  if (input) input.value = chatNameColor || '#40474c';
  document.documentElement.style.setProperty('--chat-name', chatNameColor || '#40474c');
}

function setChatBackgroundColor(color) {
  chatBackground.color = color || '#f7f7f7';
  chatBackground.transparent = false;
  applyChatBackground();
  saveChatBackground();
}

function setChatBackgroundTransparent(checked) {
  chatBackground.transparent = !!checked;
  applyChatBackground();
  saveChatBackground();
}

function resetChatBackground() {
  chatBackground = { color: '#f7f7f7', transparent: false };
  applyChatBackground();
  saveChatBackground();
}

function setChatNameColor(color) {
  chatNameColor = color || '#40474c';
  applyChatNameColor();
  saveChatNameColor();
  renderChat();
}

function saveSlots() {
  return writeJson(STORAGE_KEYS.slots, conversationSlots);
}

function getHighestMessageId() {
  return messages.reduce((max, m) => Math.max(max, Number(m.id) || 0), 0);
}

function getMessageSide(character) {
  if (layoutMode === 'left') return 'left';
  return character.side === 'right' ? 'right' : 'left';
}

function normalizeProfileShape(shape) {
  return shape === 'square' ? 'square' : 'circle';
}

function applyFrameShape(frame, shape) {
  if (!frame) return;
  frame.classList.toggle('shape-square', normalizeProfileShape(shape) === 'square');
}

function applyCropShape(shape) {
  const normalized = normalizeProfileShape(shape);
  applyFrameShape(document.querySelector('.crop-viewport'), normalized);
  applyFrameShape(document.getElementById('crop-image-ghost'), normalized);
}

function updateShapeButtons(shape = selectedProfileShape) {
  const normalized = normalizeProfileShape(shape);
  const circle = document.getElementById('profile-shape-circle');
  const square = document.getElementById('profile-shape-square');
  if (circle) circle.classList.toggle('active', normalized === 'circle');
  if (square) square.classList.toggle('active', normalized === 'square');
}

function getProfile(character = {}) {
  const profile = character.profile || {};
  return {
    src: profile.src || character.url || '',
    x: Number(profile.x) || 0,
    y: Number(profile.y) || 0,
    scale: Number.isFinite(Number(profile.scale)) ? Number(profile.scale) : 1,
    shape: normalizeProfileShape(profile.shape || character.shape)
  };
}

function createAvatar(profile, alt, sizeClass = 'avatar-frame') {
  const frame = document.createElement('div');
  frame.className = sizeClass;
  const data = getProfile({ profile });
  applyFrameShape(frame, data.shape);
  if (!data.src) return frame;

  const img = document.createElement('img');
  img.className = 'avatar-img';
  img.alt = alt || '';
  img.onerror = function(){ frame.style.background = '#6a8aaa'; this.remove(); };
  frame.appendChild(img);
  applyImageTransform(img, data);
  setImageElementSource(img, data.src, frame);
  return frame;
}

function applyImageTransform(img, profile) {
  const scale = Number.isFinite(Number(profile.scale)) ? Number(profile.scale) : 1;
  const frame = img.parentElement;
  let frameSize = CROP_CONTENT_SIZE;
  if (frame) {
    if (frame.classList.contains('char-avatar')) frameSize = 22;
    else if (frame.classList.contains('avatar')) frameSize = 40;
    else if (frame.id === 'profile-preview') frameSize = 64;
    else if (frame.classList.contains('crop-viewport')) frameSize = CROP_CONTENT_SIZE;
    else if (img.classList.contains('crop-image-ghost')) frameSize = CROP_CONTENT_SIZE;
    else frameSize = frame.clientWidth || frame.getBoundingClientRect().width || CROP_CONTENT_SIZE;
  }
  const ratio = frameSize / CROP_CONTENT_SIZE;
  const x = (Number(profile.x) || 0) * ratio;
  const y = (Number(profile.y) || 0) * ratio;
  img.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

function setPendingProfile(profile) {
  const shape = normalizeProfileShape(profile.shape || selectedProfileShape);
  selectedProfileShape = shape;
  pendingProfile = {
    src: profile.src,
    x: Number(profile.x) || 0,
    y: Number(profile.y) || 0,
    scale: Number.isFinite(Number(profile.scale)) ? Number(profile.scale) : 1,
    shape
  };
  renderProfilePreview();
}

function updateCharacterFormMode() {
  const submit = document.querySelector('button[onclick="addChar()"]');
  const cancel = document.getElementById('char-edit-cancel');
  if (submit) submit.textContent = editingCharacterName ? '수정 저장' : '+ 등록';
  if (cancel) cancel.hidden = !editingCharacterName;
}

function updateRecropButton() {
  const button = document.getElementById('profile-recrop-button');
  if (button) button.hidden = !(pendingProfile && pendingProfile.src);
}

function clearPendingProfile() {
  pendingProfile = null;
  selectedProfileShape = 'circle';
  const preview = document.getElementById('profile-preview');
  preview.innerHTML = '';
  preview.style.background = '#b4c9e2';
  applyFrameShape(preview, selectedProfileShape);
  updateShapeButtons();
  updateRecropButton();
}

function renderProfilePreview() {
  const preview = document.getElementById('profile-preview');
  preview.innerHTML = '';
  preview.style.background = '#b4c9e2';
  const shape = pendingProfile ? pendingProfile.shape : selectedProfileShape;
  applyFrameShape(preview, shape);
  updateShapeButtons(shape);
  if (pendingProfile && pendingProfile.src) {
    const img = document.createElement('img');
    img.className = 'avatar-img';
    img.alt = '프로필 미리보기';
    img.onerror = function(){ preview.style.background = '#6a8aaa'; this.remove(); };
    preview.appendChild(img);
    applyImageTransform(img, pendingProfile);
    setImageElementSource(img, pendingProfile.src, preview);
  }
  updateRecropButton();
}

function recropPendingProfile() {
  if (!pendingProfile || !pendingProfile.src) return alert('다시 자를 프로필 이미지가 없습니다.');
  openCropModal(pendingProfile);
}

function setProfileShape(shape) {
  selectedProfileShape = normalizeProfileShape(shape);
  if (pendingProfile) pendingProfile.shape = selectedProfileShape;
  if (cropState) {
    cropState.shape = selectedProfileShape;
    applyCropShape(selectedProfileShape);
  }
  renderProfilePreview();
}

function loadProfileFromUrl() {
  const src = document.getElementById('char-url').value.trim();
  if (!src) return alert('이미지 URL을 입력해 주세요.');
  openCropModal({ src, x: 0, y: 0, scale: 1, shape: selectedProfileShape });
}

function openCropModal(profile) {
  cropPointers.clear();
  cropDrag = null;
  cropGesture = null;
  cropState = {
    src: profile.src,
    x: Number(profile.x) || 0,
    y: Number(profile.y) || 0,
    scale: Number.isFinite(Number(profile.scale)) ? Number(profile.scale) : 1,
    shape: normalizeProfileShape(profile.shape || selectedProfileShape)
  };
  selectedProfileShape = cropState.shape;
  const modal = document.getElementById('crop-modal');
  const img = document.getElementById('crop-image');
  const ghost = document.getElementById('crop-image-ghost');
  img.removeAttribute('src');
  ghost.removeAttribute('src');
  applyCropShape(cropState.shape);
  updateShapeButtons(cropState.shape);
  updateCropPreview();
  setImageElementSource(img, cropState.src);
  setImageElementSource(ghost, cropState.src);
  modal.classList.add('open');
}

function closeCropModal() {
  document.getElementById('crop-modal').classList.remove('open');
  cropState = null;
  cropDrag = null;
  cropGesture = null;
  cropPointers.clear();
}

function applyProfileCrop() {
  if (!cropState || !cropState.src) return closeCropModal();
  setPendingProfile(cropState);
  closeCropModal();
}

function updateCropPreview() {
  if (!cropState) return;
  applyCropShape(cropState.shape);
  applyImageTransform(document.getElementById('crop-image'), cropState);
  applyImageTransform(document.getElementById('crop-image-ghost'), cropState);
}

function setLayoutMode(mode) {
  layoutMode = mode === 'left' ? 'left' : 'paired';
  const select = document.getElementById('chat-layout');
  if (select) select.value = layoutMode;
  saveLayout();
  renderChat();
}

async function loadLocalData() {
  characters = readJson(STORAGE_KEYS.characters, {});
  const draft = readJson(STORAGE_KEYS.draft, {});
  messages = Array.isArray(draft.messages) ? draft.messages : [];
  msgIdSeq = Number(draft.msgIdSeq) || getHighestMessageId();
  layoutMode = localStorage.getItem(STORAGE_KEYS.layout) === 'left' ? 'left' : 'paired';
  chatBackground = readJson(STORAGE_KEYS.chatBg, chatBackground);
  chatBackground = {
    color: chatBackground.color || '#f7f7f7',
    transparent: !!chatBackground.transparent
  };
  chatNameColor = localStorage.getItem(STORAGE_KEYS.nameColor) || '#40474c';
  conversationSlots = readJson(STORAGE_KEYS.slots, []);
  if (!Array.isArray(conversationSlots)) conversationSlots = [];
  try {
    if (await migrateProfileImagesToIndexedDb()) {
      saveCharacters();
      saveSlots();
    }
  } catch (e) {}

  const layoutSelect = document.getElementById('chat-layout');
  if (layoutSelect) layoutSelect.value = layoutMode;
  applyChatBackground();
  applyChatNameColor();
  renderProfilePreview();
  updateCharacterFormMode();
  renderCharList();
  renderCharSelect();
  renderChat();
  renderSlotList();
}

// ── 캐릭터 등록 ──
async function addChar() {
  const name      = document.getElementById('char-name').value.trim();
  const typedUrl  = document.getElementById('char-url').value.trim();
  const side      = document.getElementById('char-side').value;
  const bubbleBg  = document.getElementById('char-bubble-bg').value;
  const bubbleTxt = document.getElementById('char-bubble-text').value;
  if (!name) return alert('이름을 입력하세요.');
  if (editingCharacterName && editingCharacterName !== name && characters[name]) {
    return alert('이미 같은 이름의 캐릭터가 있습니다.');
  }
  const baseProfile = pendingProfile
    ? { ...pendingProfile, shape: selectedProfileShape }
    : (typedUrl ? { src: typedUrl, x: 0, y: 0, scale: 1, shape: selectedProfileShape } : { src: '', x: 0, y: 0, scale: 1, shape: selectedProfileShape });
  const profile = await persistProfileImage(baseProfile);
  if (editingCharacterName && editingCharacterName !== name) {
    delete characters[editingCharacterName];
    messages = messages.map(m => m.name === editingCharacterName ? { ...m, name } : m);
    saveDraft();
  }
  characters[name] = { url: profile.src, profile, shape: profile.shape, side, bubbleBg, bubbleTxt };
  if (!saveCharacters()) return;
  renderCharList();
  renderCharSelect();
  renderChat();
  resetCharacterForm();
}

function resetCharacterForm() {
  editingCharacterName = null;
  document.getElementById('char-name').value = '';
  document.getElementById('char-url').value = '';
  document.getElementById('char-image-file').value = '';
  document.getElementById('char-side').value = 'left';
  document.getElementById('char-bubble-bg').value = '#ffffff';
  document.getElementById('char-bubble-text').value = '#2c3e50';
  clearPendingProfile();
  updateCharacterFormMode();
}

function cancelCharEdit() {
  resetCharacterForm();
  renderCharList();
}

function editChar(name) {
  const character = characters[name];
  if (!character) return;
  const profile = getProfile(character);
  editingCharacterName = name;
  document.getElementById('char-name').value = name;
  document.getElementById('char-url').value = (isIndexedImage(profile.src) || isDataImage(profile.src)) ? '' : profile.src;
  document.getElementById('char-image-file').value = '';
  document.getElementById('char-side').value = character.side === 'right' ? 'right' : 'left';
  document.getElementById('char-bubble-bg').value = character.bubbleBg || '#ffffff';
  document.getElementById('char-bubble-text').value = character.bubbleTxt || '#2c3e50';
  setPendingProfile(profile);
  updateCharacterFormMode();
  renderCharList();
  document.getElementById('char-name').focus();
}

function renderCharList() {
  const el = document.getElementById('char-list');
  el.innerHTML = '';
  Object.entries(characters).forEach(([name, c]) => {
    const tag = document.createElement('div');
    tag.className = 'char-tag';
    if (editingCharacterName === name) tag.classList.add('editing');
    const avatar = createAvatar(getProfile(c), name, 'avatar-frame char-avatar');
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = c.bubbleBg || '#fff';
    const label = document.createElement('span');
    label.textContent = `${name} (${c.side === 'left' ? '←' : '→'})`;
    const edit = document.createElement('button');
    edit.className = 'ghost';
    edit.type = 'button';
    edit.textContent = '수정';
    edit.onclick = () => editChar(name);
    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = '×';
    del.title = '캐릭터 삭제';
    del.onclick = () => deleteChar(name);
    tag.appendChild(avatar);
    tag.appendChild(dot);
    tag.appendChild(label);
    tag.appendChild(edit);
    tag.appendChild(del);
    el.appendChild(tag);
  });
}

function deleteChar(name) {
  if (editingCharacterName === name) resetCharacterForm();
  delete characters[name];
  messages = messages.filter(m => m.name !== name);
  saveCharacters();
  saveDraft();
  renderCharList();
  renderCharSelect();
  renderChat();
}

function renderCharSelect() {
  const sel = document.getElementById('msg-char');
  const prev = sel.value;
  sel.innerHTML = '';
  Object.keys(characters).forEach(name => {
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    sel.appendChild(option);
  });
  if (characters[prev]) sel.value = prev;
}

function readImageFileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('이미지를 읽지 못했습니다.'));
    reader.onload = () => {
      const original = reader.result;
      if (typeof original === 'string' && original.length <= 4200000) {
        resolve(original);
        return;
      }

      const img = new Image();
      img.onerror = () => reject(new Error('이미지를 불러오지 못했습니다.'));
      img.onload = () => {
        const maxSize = 1800;
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const outputType = file.type === 'image/webp' ? 'image/webp' : 'image/jpeg';
        resolve(canvas.toDataURL(outputType, 0.95));
      };
      img.src = original;
    };
    reader.readAsDataURL(file);
  });
}

// ── 메시지 추가 ──
function addMessage() {
  const name = document.getElementById('msg-char').value;
  const text = document.getElementById('msg-text').value.trim();
  const date = document.getElementById('msg-date').value.trim();
  if (!name) return alert('캐릭터를 먼저 등록하세요.');
  if (!text) return alert('메시지를 입력하세요.');
  if (date) messages.push({ id: ++msgIdSeq, type: 'date', text: date });
  messages.push({ id: ++msgIdSeq, name, text });
  document.getElementById('msg-text').value = '';
  document.getElementById('msg-date').value = '';
  saveDraft();
  renderChat();
  const cv = document.getElementById('chat-view');
  cv.scrollTop = cv.scrollHeight;
}

// ── 메시지 삭제 ──
function deleteMsg(id) {
  messages = messages.filter(m => m.id !== id);
  saveDraft();
  renderChat();
}

// ── 메시지 수정 ──
function editMsg(id) {
  const m = messages.find(m => m.id === id);
  if (!m) return;
  const cv = document.getElementById('chat-view');
  // 해당 행의 bubble 또는 date-divider 찾기
  const el = cv.querySelector(`[data-id="${id}"]`);
  if (!el) return;

  if (m.type === 'date') {
    // 날짜 구분선 인라인 수정
    const orig = m.text;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = orig;
    input.style.cssText = 'flex:1;background:#ffffff;border:1px solid #96bae8;color:#2f3437;border-radius:6px;padding:3px 8px;font-size:11px;outline:none;';
    const textSpan = el.querySelector('.date-text');
    textSpan.replaceWith(input);
    input.focus();
    const save = () => {
      const v = input.value.trim();
      if (v) m.text = v;
      saveDraft();
      renderChat();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } });
    return;
  }

  // 말풍선 수정
  const bubbleEl = el.querySelector('.bubble');
  if (!bubbleEl) return;
  el.classList.add('editing');
  const bubbleRect = bubbleEl.getBoundingClientRect();
  const bodyEl = el.querySelector('.msg-body');
  const cvRect = cv.getBoundingClientRect();
  const isCompact = window.matchMedia('(max-width: 520px)').matches;
  const reservedWidth = isCompact ? 110 : 120;
  const maxBodyWidth = Math.max(120, Math.floor(cvRect.width - reservedWidth));
  const editWidth = Math.max(120, Math.ceil(bubbleRect.width), maxBodyWidth);
  const origText = m.text;
  const ta = document.createElement('textarea');
  ta.className = 'bubble-edit';
  ta.value = origText;
  if (bodyEl) {
    bodyEl.style.width = editWidth + 'px';
    bodyEl.style.maxWidth = editWidth + 'px';
  }
  ta.style.width = editWidth + 'px';
  ta.style.minHeight = Math.max(60, Math.ceil(bubbleRect.height)) + 'px';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'edit-save-btn';
  saveBtn.textContent = '저장';
  const cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'margin-top:4px;margin-left:4px;background:#eef1f3;color:#3d454a;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;';
  cancelBtn.textContent = '취소';
  bubbleEl.replaceWith(ta);
  // saveBtn/cancelBtn 삽입
  const btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex;gap:4px;margin-top:4px;';
  btnWrap.appendChild(saveBtn);
  btnWrap.appendChild(cancelBtn);
  ta.after(btnWrap);
  ta.focus();

  saveBtn.onclick = () => {
    const v = ta.value.trim();
    if (v) m.text = v;
    saveDraft();
    renderChat();
  };
  cancelBtn.onclick = () => renderChat();
}

// ── 채팅 렌더 ──
function renderChat() {
  const cv = document.getElementById('chat-view');
  cv.innerHTML = '';
  messages.forEach(m => {
    if (m.type === 'date') {
      const d = document.createElement('div');
      d.className = 'date-divider';
      d.dataset.id = m.id;
      const textSpan = document.createElement('span');
      textSpan.className = 'date-text';
      textSpan.textContent = m.text;
      const delSpan = document.createElement('span');
      delSpan.className = 'date-del';
      delSpan.textContent = '×';
      delSpan.title = '날짜 삭제';
      delSpan.onclick = () => deleteMsg(m.id);
      // 수정: 클릭으로 인라인 편집
      textSpan.style.cursor = 'pointer';
      textSpan.title = '클릭하여 수정';
      textSpan.onclick = () => editMsg(m.id);
      d.appendChild(textSpan);
      d.appendChild(delSpan);
      cv.appendChild(d);
      return;
    }
    const c = characters[m.name] || { url:'', side:'left', bubbleBg:'#ffffff', bubbleTxt:'#2c3e50' };
    const side = getMessageSide(c);
    const row = document.createElement('div');
    row.className = 'msg-row ' + side;
    row.dataset.id = m.id;
    const bStyle = `background:${c.bubbleBg||'#ffffff'};color:${c.bubbleTxt||'#2c3e50'}`;

    // 액션 버튼
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `<button onclick="editMsg(${m.id})">✏️ 수정</button><button class="del-btn" onclick="deleteMsg(${m.id})">🗑 삭제</button>`;

    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = `<div class="msg-name">${escHtml(m.name)}</div><div class="bubble" style="${bStyle}">${escHtml(m.text)}</div>`;

    const avatar = createAvatar(getProfile(c), m.name, 'avatar-frame avatar');

    if (side === 'right') {
      row.appendChild(actions);
      row.appendChild(body);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(body);
      row.appendChild(actions);
    }
    cv.appendChild(row);
  });
}

function escHtml(t) {
  return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escAttr(t) {
  return escHtml(t).replace(/"/g,'&quot;');
}

// ── 대화 내용만 삭제 (캐릭터 유지) ──
function clearMessages() {
  if (!messages.length) return alert('삭제할 대화가 없습니다.');
  if (!confirm('대화 내용을 모두 삭제할까요?\n캐릭터 등록은 유지됩니다.')) return;
  messages = [];
  msgIdSeq = 0;
  saveDraft();
  renderChat();
  document.getElementById('output-section').style.display = 'none';
}

// ── 전체 초기화 ──
function clearAll() {
  if (!confirm('현재 캐릭터와 대화를 삭제할까요?\n저장 슬롯은 유지됩니다.')) return;
  characters = {}; messages = []; msgIdSeq = 0;
  saveCharacters();
  saveDraft();
  renderCharList(); renderCharSelect(); renderChat();
  document.getElementById('output-section').style.display = 'none';
}

// ── 대화 슬롯 저장 ──
function saveConversationSlot() {
  if (!messages.length) return alert('저장할 대화가 없습니다.');
  const input = document.getElementById('save-title');
  const title = input.value.trim() || `대화 ${conversationSlots.length + 1}`;
  const existingIndex = conversationSlots.findIndex(slot => slot.title === title);
  if (existingIndex === -1 && conversationSlots.length >= 5) {
    return alert('대화 저장은 최대 5개까지 가능합니다. 기존 저장 슬롯을 삭제한 뒤 다시 저장해 주세요.');
  }

  const slot = {
    id: existingIndex >= 0 ? conversationSlots[existingIndex].id : String(Date.now()),
    title,
    savedAt: new Date().toISOString(),
    messages: JSON.parse(JSON.stringify(messages)),
    characters: JSON.parse(JSON.stringify(characters)),
    msgIdSeq,
    layoutMode
  };

  if (existingIndex >= 0) conversationSlots.splice(existingIndex, 1);
  conversationSlots.unshift(slot);
  if (!saveSlots()) return;
  input.value = '';
  renderSlotList();
}

function loadConversationSlot(id) {
  const slot = conversationSlots.find(item => item.id === id);
  if (!slot) return;
  if (messages.length && !confirm('현재 작성 중인 대화를 저장된 대화로 바꿀까요?')) return;
  messages = JSON.parse(JSON.stringify(slot.messages || []));
  characters = JSON.parse(JSON.stringify(slot.characters || {}));
  msgIdSeq = Number(slot.msgIdSeq) || getHighestMessageId();
  layoutMode = slot.layoutMode === 'left' ? 'left' : 'paired';
  const layoutSelect = document.getElementById('chat-layout');
  if (layoutSelect) layoutSelect.value = layoutMode;
  saveCharacters();
  saveDraft();
  saveLayout();
  renderCharList();
  renderCharSelect();
  renderChat();
}

function deleteConversationSlot(id) {
  if (!confirm('이 저장 슬롯을 삭제할까요?')) return;
  conversationSlots = conversationSlots.filter(item => item.id !== id);
  saveSlots();
  renderSlotList();
}

function renderSlotList() {
  const list = document.getElementById('slot-list');
  list.innerHTML = '';
  if (!conversationSlots.length) {
    const empty = document.createElement('div');
    empty.className = 'slot-empty';
    empty.textContent = '저장된 대화가 없습니다.';
    list.appendChild(empty);
    return;
  }
  conversationSlots.forEach(slot => {
    const item = document.createElement('div');
    item.className = 'slot-item';

    const text = document.createElement('div');
    text.className = 'slot-title';
    const title = document.createElement('div');
    title.textContent = slot.title;
    const meta = document.createElement('div');
    meta.className = 'slot-meta';
    const count = Array.isArray(slot.messages) ? slot.messages.filter(m => m.type !== 'date').length : 0;
    meta.textContent = `${count}개 메시지 · ${formatSavedAt(slot.savedAt)}`;
    text.appendChild(title);
    text.appendChild(meta);

    const load = document.createElement('button');
    load.className = 'ghost';
    load.textContent = '불러오기';
    load.onclick = () => loadConversationSlot(slot.id);

    const del = document.createElement('button');
    del.className = 'danger';
    del.textContent = '삭제';
    del.onclick = () => deleteConversationSlot(slot.id);

    item.appendChild(text);
    item.appendChild(load);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function formatSavedAt(value) {
  if (!value) return '날짜 없음';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '날짜 없음';
  return date.toLocaleString('ko-KR', {
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}

// ── HTML 내보내기 ──
function convertDataImageToWebp(src) {
  if (!src) return Promise.resolve(src);
  if (!isDataImage(src) && !/^https?:/i.test(src)) return Promise.resolve(src);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      try {
        const sourceWidth = Math.max(1, img.naturalWidth || img.width);
        const sourceHeight = Math.max(1, img.naturalHeight || img.height);
        const ratio = Math.min(1, EXPORT_IMAGE_MAX_SIZE / Math.max(sourceWidth, sourceHeight));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(sourceWidth * ratio));
        canvas.height = Math.max(1, Math.round(sourceHeight * ratio));
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const webp = canvas.toDataURL('image/webp', EXPORT_WEBP_QUALITY);
        resolve(webp.startsWith('data:image/webp;') ? webp : src);
      } catch (err) {
        resolve(src);
      }
    };
    img.onerror = () => resolve(src);
    if (!isDataImage(src)) img.crossOrigin = 'anonymous';
    img.src = src;
  });
}

function createExportAvatarRegistry() {
  return { map: new Map(), rules: [] };
}

async function getExportAvatarClass(src, registry) {
  if (!src) return '';
  if (registry.map.has(src)) return registry.map.get(src);
  const className = `cb-av-${registry.map.size}`;
  registry.map.set(src, className);
  const optimizedSrc = await convertDataImageToWebp(src);
  registry.rules.push(`.${className}{background-image:url(${optimizedSrc})}`);
  return className;
}

function getExportAvatarCss(registry) {
  if (!registry.rules.length) return '';
  return `<style>`
    + `.cb-avatar{box-sizing:border-box;width:44px;height:44px;min-width:44px;background:#6a8aaa;border:2px solid rgba(255,255,255,.5);box-shadow:0 2px 8px rgba(0,0,0,.12);overflow:hidden}`
    + `.cb-avatar-circle{border-radius:50%}.cb-avatar-square{border-radius:8px}`
    + `.cb-avatar-img{box-sizing:border-box;display:block;background-position:center;background-size:contain;background-repeat:no-repeat;transform-origin:center;font-size:0;line-height:0;color:transparent;overflow:hidden}`
    + `.cb-avatar-img-circle{width:70.71%;height:70.71%;margin:14.645%}.cb-avatar-img-square{width:100%;height:100%;margin:0}`
    + registry.rules.join('')
    + `</style>\n`;
}

async function getAvatarHtmlForExport(profile, name, registry) {
  const data = getProfile({ profile });
  const shape = data.shape === 'square' ? 'square' : 'circle';
  if (!data.src) {
    return `<div class="cb-avatar cb-avatar-${shape}"></div>`;
  }
  const resolvedSrc = await resolveImageSrc(data.src);
  if (!resolvedSrc) {
    return `<div class="cb-avatar cb-avatar-${shape}"></div>`;
  }
  const assetClass = await getExportAvatarClass(resolvedSrc, registry);
  const exportRatio = 40 / CROP_CONTENT_SIZE;
  const x = (Number(data.x) || 0) * exportRatio;
  const y = (Number(data.y) || 0) * exportRatio;
  const scale = Number.isFinite(Number(data.scale)) ? Number(data.scale) : 1;
  return `<div class="cb-avatar cb-avatar-${shape}" role="img" aria-label="${escAttr(name)}">`
    + `<span class="cb-avatar-img cb-avatar-img-${shape} ${assetClass}" aria-hidden="true" style="transform:translate(${x}px,${y}px) scale(${scale})">&nbsp;</span>`
    + `</div>`;
}

async function materializeProfileForBackup(profile) {
  const data = getProfile({ profile });
  return {
    ...data,
    src: data.src ? await resolveImageSrc(data.src) : ''
  };
}

async function materializeCharactersForBackup(map) {
  const output = {};
  for (const [name, character] of Object.entries(map || {})) {
    const profile = await materializeProfileForBackup(character.profile || { src: character.url, shape: character.shape });
    output[name] = {
      ...character,
      url: profile.src,
      profile,
      shape: profile.shape
    };
  }
  return output;
}

async function materializeSlotsForBackup(slots) {
  const output = [];
  for (const slot of (Array.isArray(slots) ? slots.slice(0, 5) : [])) {
    output.push({
      ...slot,
      messages: JSON.parse(JSON.stringify(slot.messages || [])),
      characters: await materializeCharactersForBackup(slot.characters || {})
    });
  }
  return output;
}

function downloadTextFile(filename, text) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

async function exportBackupTxt() {
  const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const backup = {
    app: 'chat-backup-html',
    version: 1,
    exportedAt: new Date().toISOString(),
    layoutMode,
    msgIdSeq,
    messages: JSON.parse(JSON.stringify(messages)),
    characters: await materializeCharactersForBackup(characters),
    conversationSlots: await materializeSlotsForBackup(conversationSlots)
  };
  downloadTextFile(`chat-backup-${stamp}.txt`, JSON.stringify(backup, null, 2));
}

function parseBackupTxt(text) {
  const trimmed = String(text || '').trim();
  const start = trimmed.indexOf('{');
  const end = trimmed.lastIndexOf('}');
  if (start < 0 || end <= start) throw new Error('backup-json-missing');
  return JSON.parse(trimmed.slice(start, end + 1));
}

function cloneMessagesForImport(value) {
  return Array.isArray(value)
    ? value.filter(Boolean).map(item => ({ ...item }))
    : [];
}

async function normalizeImportedCharacters(map) {
  const output = {};
  for (const [name, character] of Object.entries(map || {})) {
    if (!name || !character) continue;
    const profile = await persistProfileImage(getProfile(character));
    output[name] = {
      ...character,
      url: profile.src,
      profile,
      shape: profile.shape,
      side: character.side === 'right' ? 'right' : 'left',
      bubbleBg: character.bubbleBg || '#ffffff',
      bubbleTxt: character.bubbleTxt || '#2c3e50'
    };
  }
  return output;
}

async function normalizeImportedSlots(value) {
  const input = Array.isArray(value) ? value.slice(0, 5) : [];
  const output = [];
  for (const slot of input) {
    if (!slot) continue;
    output.push({
      id: String(slot.id || Date.now() + '-' + output.length),
      title: slot.title || `TXT 저장 ${output.length + 1}`,
      savedAt: slot.savedAt || new Date().toISOString(),
      messages: cloneMessagesForImport(slot.messages),
      characters: await normalizeImportedCharacters(slot.characters || {}),
      msgIdSeq: Number(slot.msgIdSeq) || 0,
      layoutMode: slot.layoutMode === 'left' ? 'left' : 'paired'
    });
  }
  return output;
}

async function importBackupTxtFile(file) {
  if (!file) return;
  try {
    const backup = parseBackupTxt(await file.text());
    const nextMessages = cloneMessagesForImport(backup.messages);
    const nextCharacters = await normalizeImportedCharacters(backup.characters || {});
    const nextSlots = await normalizeImportedSlots(backup.conversationSlots || backup.slots);
    if (!nextMessages.length && !Object.keys(nextCharacters).length && !nextSlots.length) {
      return alert('불러올 대화 또는 프로필 데이터가 없습니다.');
    }
    if ((messages.length || Object.keys(characters).length) && !confirm('현재 작성 중인 대화와 프로필을 TXT 백업 내용으로 바꿀까요?')) return;
    messages = nextMessages;
    characters = nextCharacters;
    conversationSlots = nextSlots;
    msgIdSeq = Math.max(Number(backup.msgIdSeq) || 0, getHighestMessageId());
    layoutMode = backup.layoutMode === 'left' ? 'left' : 'paired';
    const layoutSelect = document.getElementById('chat-layout');
    if (layoutSelect) layoutSelect.value = layoutMode;
    saveCharacters();
    saveDraft();
    saveLayout();
    saveSlots();
    renderCharList();
    renderCharSelect();
    renderChat();
    renderSlotList();
    alert('TXT 백업을 불러왔습니다.');
  } catch (err) {
    alert('이 앱에서 내보낸 TXT 백업 파일을 선택해 주세요.');
  }
}

function getExportChatMaxWidth() {
  const chatView = document.getElementById('chat-view');
  const width = chatView ? Math.round(chatView.getBoundingClientRect().width) : 750;
  return Math.max(320, width);
}

async function exportHTML() {
  if (!messages.length) return alert('메시지가 없습니다.');

  const avatarRegistry = createExportAvatarRegistry();
  const rows = (await Promise.all(messages.map(async m => {
    if (m.type === 'date') {
      return `<div style="display:flex;align-items:center;gap:8px;color:#7f8c8d;font-size:11px;letter-spacing:.06em;margin:4px 0;">`
        + `<span style="flex:1;height:1px;background:rgba(100,140,180,.3);display:block;"></span>`
        + escHtml(m.text)
        + `<span style="flex:1;height:1px;background:rgba(100,140,180,.3);display:block;"></span></div>`;
    }
    const c = characters[m.name] || { url:'', side:'left', bubbleBg:'#ffffff', bubbleTxt:'#2c3e50' };
    const isRight = getMessageSide(c) === 'right';
    const rowStyle = `display:flex;align-items:flex-start;gap:8px;`;
    const bodyStyle = ['display:flex','flex-direction:column','gap:3px','max-width:calc(100% - 120px)', isRight?'align-items:flex-end':''].filter(Boolean).join(';');
    const bubbleRadius = isRight ? '14px 4px 14px 14px' : '4px 14px 14px 14px';
    const avatarEl = await getAvatarHtmlForExport(getProfile(c), m.name, avatarRegistry);
    const nameDiv = `<div style="font-size:11px;font-weight:600;color:${chatNameColor || '#40474c'};padding:0 4px;letter-spacing:.04em;font-family:inherit,sans-serif;">${escHtml(m.name)}</div>`;
    const bubbleDiv = `<div style="background:${c.bubbleBg||'#fff'};color:${c.bubbleTxt||'#2c3e50'};padding:8px 12px;border-radius:${bubbleRadius};font-size:13px;line-height:1.6;box-shadow:0 2px 6px rgba(0,0,0,.12);word-break:break-word;text-align:justify;font-family:inherit,sans-serif;">${escHtml(m.text)}</div>`;
    const bodyDiv = `<div style="${bodyStyle}">${nameDiv}${bubbleDiv}</div>`;
    // 오른쪽: 빈 spacer → body → avatar / 왼쪽: avatar → body
    if (isRight) {
      return `<div style="${rowStyle}"><div style="flex:1;"></div>${bodyDiv}${avatarEl}</div>`;
    } else {
      return `<div style="${rowStyle}">${avatarEl}${bodyDiv}</div>`;
    }
  }))).join('\n');

  const exportMaxWidth = getExportChatMaxWidth();
  const avatarCss = getExportAvatarCss(avatarRegistry);
  const html = `<!-- 채팅 백업 -->
${avatarCss}
<div style="font-family:'Noto Sans KR',sans-serif;background:${getChatBackgroundCss()};border:1px solid #d7dde1;border-radius:8px;padding:16px 12px;display:flex;flex-direction:column;gap:30px;max-width:${exportMaxWidth}px;width:100%;margin:0 auto;box-sizing:border-box;">
${rows}
</div>`;

  const out = document.getElementById('html-output');
  out.value = html;
  document.getElementById('output-section').style.display = 'flex';
  try { out.select(); document.execCommand('copy'); alert('✅ 복사됐습니다!\nHTML 편집기에 붙여넣기 하세요.'); }
  catch(e) { alert('아래 코드를 직접 복사해 주세요.'); }
}

// Ctrl+Enter 전송
document.getElementById('msg-text').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') addMessage();
});

document.getElementById('backup-import-file').addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  await importBackupTxtFile(file);
  e.target.value = '';
});

document.getElementById('char-image-file').addEventListener('click', e => {
  e.target.value = '';
});

document.getElementById('char-image-file').addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    e.target.value = '';
    return alert('이미지 파일을 선택해 주세요.');
  }
  try {
    const src = await readImageFileToDataUrl(file);
    document.getElementById('char-url').value = '';
    openCropModal({ src, x: 0, y: 0, scale: 1, shape: selectedProfileShape });
    e.target.value = '';
  } catch (err) {
    e.target.value = '';
    alert(err.message || '이미지 처리에 실패했습니다.');
  }
});

function getCropPointerPair() {
  return Array.from(cropPointers.values()).slice(0, 2);
}

function getPointerDistance(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

function getPointerCenter(a, b) {
  return {
    x: (a.x + b.x) / 2,
    y: (a.y + b.y) / 2
  };
}

function startCropDrag(pointer) {
  cropDrag = {
    id: pointer.id,
    startX: pointer.x,
    startY: pointer.y,
    x: cropState.x,
    y: cropState.y
  };
}

function startCropGesture() {
  const [a, b] = getCropPointerPair();
  if (!a || !b || !cropState) return;
  const distance = getPointerDistance(a, b);
  const center = getPointerCenter(a, b);
  cropGesture = {
    distance: Math.max(distance, 0.01),
    centerX: center.x,
    centerY: center.y,
    scale: cropState.scale,
    x: cropState.x,
    y: cropState.y
  };
  cropDrag = null;
}

function finishCropPointer(e) {
  cropPointers.delete(e.pointerId);
  try {
    e.currentTarget.releasePointerCapture(e.pointerId);
  } catch (err) {}

  if (!cropState || cropPointers.size === 0) {
    cropDrag = null;
    cropGesture = null;
    return;
  }

  if (cropPointers.size === 1) {
    cropGesture = null;
    startCropDrag(Array.from(cropPointers.values())[0]);
  } else {
    startCropGesture();
  }
}

document.getElementById('crop-stage').addEventListener('pointerdown', e => {
  if (!cropState) return;
  e.preventDefault();
  const pointer = { id: e.pointerId, x: e.clientX, y: e.clientY };
  cropPointers.set(e.pointerId, pointer);
  try {
    e.currentTarget.setPointerCapture(e.pointerId);
  } catch (err) {}

  if (cropPointers.size === 1) {
    startCropDrag(pointer);
  } else {
    startCropGesture();
  }
});

document.getElementById('crop-stage').addEventListener('pointermove', e => {
  if (!cropState || !cropPointers.has(e.pointerId)) return;
  e.preventDefault();
  cropPointers.set(e.pointerId, { id: e.pointerId, x: e.clientX, y: e.clientY });

  if (cropPointers.size >= 2) {
    if (!cropGesture) startCropGesture();
    const [a, b] = getCropPointerPair();
    const distance = Math.max(getPointerDistance(a, b), 0.01);
    const center = getPointerCenter(a, b);
    cropState.scale = cropGesture.scale * (distance / cropGesture.distance);
    cropState.x = cropGesture.x + (center.x - cropGesture.centerX);
    cropState.y = cropGesture.y + (center.y - cropGesture.centerY);
    updateCropPreview();
    return;
  }

  if (!cropDrag || cropDrag.id !== e.pointerId) return;
  cropState.x = cropDrag.x + (e.clientX - cropDrag.startX);
  cropState.y = cropDrag.y + (e.clientY - cropDrag.startY);
  updateCropPreview();
});

document.getElementById('crop-stage').addEventListener('pointerup', finishCropPointer);
document.getElementById('crop-stage').addEventListener('pointercancel', finishCropPointer);

document.getElementById('crop-stage').addEventListener('wheel', e => {
  if (!cropState) return;
  e.preventDefault();
  const zoomFactor = Math.exp(-e.deltaY * 0.001);
  cropState.scale *= zoomFactor;
  updateCropPreview();
}, { passive: false });

document.getElementById('crop-modal').addEventListener('click', e => {
  if (e.target.id === 'crop-modal') closeCropModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('crop-modal').classList.contains('open')) {
    closeCropModal();
  }
});

loadLocalData();
</script>
